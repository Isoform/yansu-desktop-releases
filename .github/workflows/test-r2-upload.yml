name: Test R2 Upload

on:
  workflow_dispatch:

env:
  APP_NAME: Yansu

jobs:
  test-r2-upload:
    name: Download latest release & upload to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Fetch latest release metadata
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/latest)

          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          VERSION_NUM="${TAG#v}"
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body // "Bug fixes and improvements."')

          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NUM=${VERSION_NUM}" >> "$GITHUB_OUTPUT"

          # Store body in a file to avoid shell escaping issues
          echo "$BODY" > /tmp/release_notes.txt

          echo "Latest release: ${TAG}"

      - name: Download release assets from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.TAG }}"
          mkdir -p r2-upload

          ASSETS=(
            "${{ env.APP_NAME }}-darwin-arm64.app.tar.gz"
            "${{ env.APP_NAME }}-darwin-amd64.app.tar.gz"
            "${{ env.APP_NAME }}-darwin-arm64.gz"
            "${{ env.APP_NAME }}-darwin-amd64.gz"
            "${{ env.APP_NAME }}-linux-amd64.gz"
            "${{ env.APP_NAME }}-windows-amd64.gz"
            "${{ env.APP_NAME }}-darwin-arm64.dmg"
            "${{ env.APP_NAME }}-darwin-amd64.dmg"
            "${{ env.APP_NAME }}-linux-amd64.tar.gz"
            "${{ env.APP_NAME }}-windows-amd64.zip"
          )

          for ASSET in "${ASSETS[@]}"; do
            echo "Downloading ${ASSET}..."
            gh release download "${TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "${ASSET}" \
              --dir r2-upload || echo "Warning: ${ASSET} not found, skipping"
          done

          echo "=== Downloaded assets ==="
          ls -lh r2-upload/

      - name: Generate version.json manifest
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          TAG="${{ steps.release.outputs.TAG }}"
          VERSION_NUM="${{ steps.release.outputs.VERSION_NUM }}"
          BASE_URL="${R2_PUBLIC_URL}/releases/${TAG}"
          NOTES=$(cat /tmp/release_notes.txt)

          LATEST_URL="${R2_PUBLIC_URL}/latest"

          jq -n \
            --arg ver "$VERSION_NUM" \
            --arg notes "$NOTES" \
            --arg da "${BASE_URL}/${{ env.APP_NAME }}-darwin-arm64.app.tar.gz" \
            --arg di "${BASE_URL}/${{ env.APP_NAME }}-darwin-amd64.app.tar.gz" \
            --arg la "${BASE_URL}/${{ env.APP_NAME }}-linux-amd64.gz" \
            --arg wa "${BASE_URL}/${{ env.APP_NAME }}-windows-amd64.gz" \
            --arg dld_mac_arm64 "${LATEST_URL}/${{ env.APP_NAME }}-darwin-arm64.dmg" \
            --arg dld_mac_amd64 "${LATEST_URL}/${{ env.APP_NAME }}-darwin-amd64.dmg" \
            --arg dld_linux "${LATEST_URL}/${{ env.APP_NAME }}-linux-amd64.tar.gz" \
            --arg dld_windows "${LATEST_URL}/${{ env.APP_NAME }}-windows-amd64.zip" \
            '{
              version: $ver,
              release_notes: $notes,
              assets: {
                "darwin-arm64": $da,
                "darwin-amd64": $di,
                "linux-amd64": $la,
                "windows-amd64": $wa
              },
              downloads: {
                "darwin-arm64": $dld_mac_arm64,
                "darwin-amd64": $dld_mac_amd64,
                "linux-amd64": $dld_linux,
                "windows-amd64": $dld_windows
              }
            }' > r2-upload/version.json

          echo "=== Generated version.json ==="
          cat r2-upload/version.json

      - name: Upload versioned release to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          TAG="${{ steps.release.outputs.TAG }}"

          aws s3 cp r2-upload/ "s3://${R2_BUCKET}/releases/${TAG}/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --exclude "version.json"

          echo "Uploaded release ${TAG} to R2"

      - name: Upload latest files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp r2-upload/ "s3://${R2_BUCKET}/latest/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --exclude "version.json"

          echo "Updated latest/ with latest release files"

      - name: Update latest version.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp r2-upload/version.json "s3://${R2_BUCKET}/version.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --content-type "application/json"

          echo "Updated root version.json"

      - name: Verify public access
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          TAG="${{ steps.release.outputs.TAG }}"

          echo "=== Verifying version.json ==="
          curl -sf "${R2_PUBLIC_URL}/version.json" | jq .

          echo ""
          echo "=== Verifying versioned asset (HEAD request) ==="
          curl -sfI "${R2_PUBLIC_URL}/releases/${TAG}/${{ env.APP_NAME }}-linux-amd64.gz" | head -5

          echo ""
          echo "=== Verifying latest/ path (HEAD request) ==="
          curl -sfI "${R2_PUBLIC_URL}/latest/${{ env.APP_NAME }}-linux-amd64.gz" | head -5

          echo ""
          echo "R2 upload verified successfully"
