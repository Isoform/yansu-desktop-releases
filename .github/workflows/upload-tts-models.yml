name: Upload TTS Voice Models to R2

# Uploads the two sherpa TTS voice-model tarballs into the existing release R2
# bucket (secrets.R2_BUCKET) under sherpa/tts/, so the desktop app can fetch
# them from the fast CDN (release.yansu.app) instead of the slow GitHub mirror.
#
# Safe by construction:
#   - writes ONLY to the new sherpa/tts/ prefix, disjoint from releases/ and
#     version.json that the release pipeline manages (cp-only, never deletes);
#   - refuses to overwrite an object that already exists;
#   - verifies SHA-256 of each tarball before upload.
#
# workflow_dispatch only — never runs automatically.

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: 'Key prefix in the bucket (must match the app download URL path)'
        required: false
        default: 'sherpa/tts'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  PREFIX: ${{ github.event.inputs.prefix || 'sherpa/tts' }}
  PUBLIC_BASE: https://release.yansu.app
  # Stop aws-cli v2 from adding CRC checksums that R2 can reject on upload.
  AWS_REQUEST_CHECKSUM_CALCULATION: when_required
  AWS_RESPONSE_CHECKSUM_VALIDATION: when_required

jobs:
  upload-tts-models:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to overwrite — abort if target objects already exist
        run: |
          set -euo pipefail
          for f in vits-melo-tts-zh_en.tar.bz2 kokoro-en-v0_19.tar.bz2; do
            key="${PREFIX}/$f"
            out=$(aws s3 ls "s3://${R2_BUCKET}/${key}" --endpoint-url "${R2_ENDPOINT}" --region auto 2>/dev/null || true)
            if [ -n "$out" ]; then
              echo "::error::s3://${R2_BUCKET}/${key} already exists — aborting to avoid overwrite."
              exit 1
            fi
            echo "OK: ${key} does not exist yet"
          done

      - name: Download canonical tarballs and verify SHA-256
        run: |
          set -euo pipefail
          mkdir -p models
          BASE=https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models
          declare -A SHA=(
            [vits-melo-tts-zh_en.tar.bz2]=e58351ed7149f290a54534538badd4077cdbe6fddc964b24d0bee870415d1514
            [kokoro-en-v0_19.tar.bz2]=912804855a04745fa77a30be545b3f9a5d15c4d66db00b88cbcd4921df605ac7
          )
          for f in "${!SHA[@]}"; do
            echo "Downloading $f ..."
            curl -fL --retry 3 -o "models/$f" "$BASE/$f"
            echo "${SHA[$f]}  models/$f" | sha256sum -c -
          done
          ls -lh models/

      - name: Upload to sherpa/tts/ in the release bucket
        run: |
          set -euo pipefail
          for f in vits-melo-tts-zh_en.tar.bz2 kokoro-en-v0_19.tar.bz2; do
            dest="s3://${R2_BUCKET}/${PREFIX}/$f"
            echo "Uploading $f -> $dest"
            aws s3 cp "models/$f" "$dest" \
              --endpoint-url "${R2_ENDPOINT}" --region auto \
              --content-type application/x-bzip2
          done

      - name: Verify public CDN access + served SHA
        run: |
          set -euo pipefail
          for f in vits-melo-tts-zh_en.tar.bz2 kokoro-en-v0_19.tar.bz2; do
            url="${PUBLIC_BASE}/${PREFIX}/$f"
            echo "HEAD $url"; curl -sfI "$url" | head -5
          done
          echo "melo served SHA:"
          curl -sfL "${PUBLIC_BASE}/${PREFIX}/vits-melo-tts-zh_en.tar.bz2" | sha256sum
          echo "expected:        e58351ed7149f290a54534538badd4077cdbe6fddc964b24d0bee870415d1514"
