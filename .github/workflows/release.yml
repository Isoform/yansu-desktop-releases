name: Release Yansu Desktop

on:
  schedule:
    # 8:30 AM UTC+8 (CST)
    - cron: '30 0 * * *'
    # 3:30 PM UTC+8 (CST)
    - cron: '30 7 * * *'
    # 9:30 PM UTC+8 (CST)
    - cron: '30 13 * * *'
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.1). Leave empty to auto-increment.'
        required: false
        default: ''
      bump_type:
        description: 'Version bump type (used when version is empty)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (markdown supported)'
        required: false
        default: 'Bug fixes and improvements.'

env:
  APP_NAME: Yansu
  SOURCE_REPO: Isoform/something
  SOURCE_PATH: wails-gui
  SOURCE_REF: main

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changelog: ${{ steps.changelog.outputs.CHANGELOG }}
      source_commit: ${{ steps.changelog.outputs.SOURCE_COMMIT }}
    steps:
      - name: Checkout source repo (full history)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source
          fetch-depth: 0

      - name: Find previous release source commit
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(gh release list --repo "${{ github.repository }}" --limit 100 --exclude-drafts \
            --json tagName -q '.[].tagName' 2>/dev/null \
            | sort -V | tail -1 || true)

          if [ -n "$PREV_TAG" ]; then
            echo "Previous release tag: $PREV_TAG"
            PREV_SHA=$(gh release view "$PREV_TAG" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null \
              | grep -oP '<!-- source-commit: \K[0-9a-f]+(?= -->)' || true)
          fi

          if [ -z "$PREV_SHA" ]; then
            echo "No previous source commit found, will use last 30 commits as fallback"
            echo "PREV_SHA=" >> "$GITHUB_OUTPUT"
          else
            echo "Previous source commit: $PREV_SHA (from $PREV_TAG)"
            echo "PREV_SHA=$PREV_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog from commits
        id: changelog
        working-directory: source
        run: |
          SOURCE_COMMIT=$(git rev-parse HEAD)
          echo "SOURCE_COMMIT=$SOURCE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Current source commit: $SOURCE_COMMIT"

          PREV_SHA="${{ steps.prev.outputs.PREV_SHA }}"

          if [ -z "$PREV_SHA" ]; then
            # Fallback: use last 30 commits touching wails-gui
            RAW_LOG=$(git log --oneline -30 -- "${{ env.SOURCE_PATH }}/" 2>/dev/null || true)
          else
            # Check if PREV_SHA exists in this repo
            if git cat-file -e "$PREV_SHA" 2>/dev/null; then
              RAW_LOG=$(git log --oneline "${PREV_SHA}..HEAD" -- "${{ env.SOURCE_PATH }}/" 2>/dev/null || true)
            else
              echo "Warning: previous SHA $PREV_SHA not found in repo, falling back to last 30 commits"
              RAW_LOG=$(git log --oneline -30 -- "${{ env.SOURCE_PATH }}/" 2>/dev/null || true)
            fi
          fi

          if [ -z "$RAW_LOG" ]; then
            CHANGELOG="Bug fixes and improvements."
            echo "No commits found for changelog"
          else
            # Categorize commits by conventional commit type
            FEATURES=""
            FIXES=""
            REFACTORS=""
            OTHER=""

            NL=$'\n'
            while IFS= read -r line; do
              # Strip the short SHA prefix
              MSG="${line#* }"
              case "$MSG" in
                feat*)     FEATURES="${FEATURES}- ${MSG}${NL}" ;;
                fix*)      FIXES="${FIXES}- ${MSG}${NL}" ;;
                refactor*) REFACTORS="${REFACTORS}- ${MSG}${NL}" ;;
                docs*|ci*|chore*|style*|test*|build*) ;; # skip non-user-facing
                *)         OTHER="${OTHER}- ${MSG}${NL}" ;;
              esac
            done <<< "$RAW_LOG"

            CHANGELOG=""
            if [ -n "$FEATURES" ]; then
              CHANGELOG="${CHANGELOG}### Features${NL}${FEATURES}${NL}"
            fi
            if [ -n "$FIXES" ]; then
              CHANGELOG="${CHANGELOG}### Bug Fixes${NL}${FIXES}${NL}"
            fi
            if [ -n "$REFACTORS" ]; then
              CHANGELOG="${CHANGELOG}### Refactoring${NL}${REFACTORS}${NL}"
            fi
            if [ -n "$OTHER" ]; then
              CHANGELOG="${CHANGELOG}### Other Changes${NL}${OTHER}${NL}"
            fi

            # Fallback if all commits were filtered out (docs/ci/chore only)
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="Bug fixes and improvements."
            fi
          fi

          # Write to output using delimiter to preserve newlines
          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "=== Generated Changelog ==="
          echo "$CHANGELOG"

  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.VERSION }}
      version_num: ${{ steps.resolve.outputs.VERSION_NUM }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Helper: find latest release tag via semver sort.
          find_latest() {
            gh release list --repo "${{ github.repository }}" --limit 100 --exclude-drafts \
              --json tagName -q '.[].tagName' 2>/dev/null \
              | sort -V | tail -1
          }

          # Helper: bump a semver tag. Usage: bump_version v0.1.59 patch → v0.1.60
          # Strips pre-release suffixes (e.g. v0.1.67-beta.2 → 0.1.67) before parsing.
          bump_version() {
            local SEMVER="${1#v}"
            SEMVER="${SEMVER%%-*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
            MAJOR="${MAJOR:-0}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"
            local BUMP="${2:-patch}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch|*) PATCH=$((PATCH + 1)) ;;
            esac
            echo "v${MAJOR}.${MINOR}.${PATCH}"
          }

          # Use explicitly provided version if available
          EXPLICIT="${{ github.event.client_payload.version || inputs.version }}"
          if [ -n "$EXPLICIT" ]; then
            echo "Using explicit version: $EXPLICIT"
            echo "VERSION=${EXPLICIT}" >> "$GITHUB_OUTPUT"
            echo "VERSION_NUM=${EXPLICIT#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-increment from latest release
          LATEST=$(find_latest)
          LATEST="${LATEST:-v0.0.0}"
          echo "Latest release: $LATEST"

          VERSION=$(bump_version "$LATEST" "${{ inputs.bump_type || 'patch' }}")
          echo "Auto-incremented version: $VERSION"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NUM=${VERSION#v}" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: [resolve-version]
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: source/${{ env.SOURCE_PATH }}/go.sum

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          brew install create-dmg

      - name: Import macOS certificates
        env:
          CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Install frontend deps
        working-directory: source/${{ env.SOURCE_PATH }}/frontend
        run: pnpm install

      - name: Compute ldflags
        id: env-ldflags
        run: |
          echo "LDFLAGS=-X main.DefaultWebBaseURL=https://dashboard.yansu.ai -X main.R2ManifestURL=${{ secrets.R2_PUBLIC_URL }}/version.json" >> "$GITHUB_OUTPUT"

      - name: Build, embed & package
        working-directory: source/${{ env.SOURCE_PATH }}
        env:
          ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CODEX_ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUILD_ARGS=(
            --platform darwin/${{ matrix.arch }}
            --version ${{ needs.resolve-version.outputs.version_num }}
            --dmg
          )
          if [ -n "${{ steps.env-ldflags.outputs.LDFLAGS }}" ]; then
            BUILD_ARGS+=(--ldflags "${{ steps.env-ldflags.outputs.LDFLAGS }}")
          fi
          bash scripts/build-wails.sh "${BUILD_ARGS[@]}"

      - name: Rename DMG with arch suffix
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        run: |
          mv "${{ env.APP_NAME }}.dmg" "${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.dmg"
          echo "DMG: $(du -sh ${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.dmg | cut -f1)"

      - name: Package — .app.tar.gz (auto-update) + .gz (legacy)
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        run: |
          # .app.tar.gz: full signed+notarized bundle for self-update (preserves codesign)
          APP_TAR="${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.app.tar.gz"
          tar -czf "$APP_TAR" "${{ env.APP_NAME }}.app"
          echo "APP_TAR: $(du -sh $APP_TAR | cut -f1)"

          # .gz: bare binary (legacy, kept for older clients)
          BINARY="${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}"
          GZ="${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.gz"
          gzip -c "$BINARY" > "$GZ"
          echo "GZ: $(du -sh $GZ | cut -f1)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.dmg
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.app.tar.gz
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.gz

  build-linux:
    name: Build Linux (amd64)
    needs: [resolve-version]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gcc \
            pkg-config \
            imagemagick \
            libcap-dev \
            libseccomp-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: source/${{ env.SOURCE_PATH }}/go.sum

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: source/${{ env.SOURCE_PATH }}/frontend
        run: pnpm install

      - name: Compute ldflags
        id: env-ldflags
        run: |
          echo "LDFLAGS=-X main.DefaultWebBaseURL=https://dashboard.yansu.ai -X main.R2ManifestURL=${{ secrets.R2_PUBLIC_URL }}/version.json" >> "$GITHUB_OUTPUT"

      - name: Build, embed & package
        working-directory: source/${{ env.SOURCE_PATH }}
        env:
          ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CODEX_ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          BUILD_ARGS=(
            --platform linux/amd64
            --version ${{ needs.resolve-version.outputs.version_num }}
          )
          if [ -n "${{ steps.env-ldflags.outputs.LDFLAGS }}" ]; then
            BUILD_ARGS+=(--ldflags "${{ steps.env-ldflags.outputs.LDFLAGS }}")
          fi
          bash scripts/build-wails.sh "${BUILD_ARGS[@]}"

      - name: Package — .tar.gz (full install) + .gz (auto-update)
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        run: |
          TAR="${{ env.APP_NAME }}-linux-amd64.tar.gz"
          GZ="${{ env.APP_NAME }}-linux-amd64.gz"
          # .tar.gz contains binary + all bundled dependencies (preserves Unix permissions)
          tar czf "$TAR" "${{ env.APP_NAME }}" acp-bundle bun-bundle codex-acp-bundle yansu-cli-bundle
          # .gz is the bare binary for auto-update
          gzip -c "${{ env.APP_NAME }}" > "$GZ"
          echo "TAR: $(du -sh $TAR | cut -f1) | GZ: $(du -sh $GZ | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-amd64
          path: |
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-linux-amd64.tar.gz
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-linux-amd64.gz

  build-windows:
    name: Build Windows (amd64)
    needs: [resolve-version]
    runs-on: windows-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: source/${{ env.SOURCE_PATH }}/go.sum

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: source/${{ env.SOURCE_PATH }}/frontend
        run: pnpm install

      - name: Compute ldflags
        id: env-ldflags
        shell: bash
        run: |
          echo "LDFLAGS=-X main.DefaultWebBaseURL=https://dashboard.yansu.ai -X main.R2ManifestURL=${{ secrets.R2_PUBLIC_URL }}/version.json" >> "$GITHUB_OUTPUT"

      - name: Build, embed & package
        working-directory: source/${{ env.SOURCE_PATH }}
        env:
          ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CODEX_ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        shell: bash
        run: |
          BUILD_ARGS=(
            --platform windows/amd64
            --version ${{ needs.resolve-version.outputs.version_num }}
          )
          if [ -n "${{ steps.env-ldflags.outputs.LDFLAGS }}" ]; then
            BUILD_ARGS+=(--ldflags "${{ steps.env-ldflags.outputs.LDFLAGS }}")
          fi
          bash scripts/build-wails.sh "${BUILD_ARGS[@]}"

      - name: Package — .zip (full install) + .gz (auto-update)
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        shell: bash
        run: |
          ZIP="${{ env.APP_NAME }}-windows-amd64.zip"
          GZ="${{ env.APP_NAME }}-windows-amd64.gz"
          # .zip contains exe + all bundled dependencies (acp, bun, codex-acp, yansu-cli)
          7z a -mx9 "$ZIP" "${{ env.APP_NAME }}.exe" acp-bundle bun-bundle codex-acp-bundle yansu-cli-bundle
          # .gz is the bare binary for auto-update
          gzip -c "${{ env.APP_NAME }}.exe" > "$GZ"
          echo "ZIP: $(du -sh $ZIP | cut -f1) | GZ: $(du -sh $GZ | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-amd64
          path: |
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-windows-amd64.zip
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-windows-amd64.gz

  release:
    name: Create Release
    needs: [resolve-version, generate-changelog, build-macos, build-linux, build-windows]
    if: ${{ !cancelled() && needs.build-macos.result == 'success' && needs.build-linux.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.gz" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt
          echo "=== Release assets ===" && ls -lh

      - name: Clean up stale draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          REPO="${{ github.repository }}"
          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            echo "Deleting existing release $VERSION..."
            gh release delete "$VERSION" --repo "$REPO" --yes --cleanup-tag
          fi

      - name: Set release notes
        id: notes
        env:
          CHANGELOG_FROM_JOB: ${{ needs.generate-changelog.outputs.changelog }}
          MANUAL_NOTES_INPUT: ${{ github.event.client_payload.release_notes || inputs.release_notes }}
        run: |
          # Use manually provided notes if given, otherwise use auto-generated changelog
          if [ -n "$MANUAL_NOTES_INPUT" ] && [ "$MANUAL_NOTES_INPUT" != "Bug fixes and improvements." ]; then
            NOTES="$MANUAL_NOTES_INPUT"
          else
            NOTES="$CHANGELOG_FROM_JOB"
          fi

          SOURCE_COMMIT="${{ needs.generate-changelog.outputs.source_commit }}"

          {
            echo "BODY<<EOF"
            echo "## Yansu Desktop ${{ needs.resolve-version.outputs.version }}"
            echo ""
            echo "$NOTES"
            echo ""
            echo "<!-- source-commit: ${SOURCE_COMMIT} -->"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BODY: ${{ steps.notes.outputs.BODY }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          REPO="${{ github.repository }}"
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "Yansu Desktop $VERSION" \
            --notes "$RELEASE_BODY" \
            release/*

  upload-to-r2:
    name: Upload to R2
    needs: [resolve-version, generate-changelog, release]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files for R2
        run: |
          mkdir -p r2-upload
          find artifacts -type f \( -name "*.gz" -o -name "*.app.tar.gz" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} r2-upload/ \;
          echo "=== Files prepared for R2 ===" && ls -lh r2-upload/

      - name: Generate version.json manifest
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          CHANGELOG_FROM_JOB: ${{ needs.generate-changelog.outputs.changelog }}
          MANUAL_NOTES_INPUT: ${{ github.event.client_payload.release_notes || inputs.release_notes }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          VERSION_NUM="${{ needs.resolve-version.outputs.version_num }}"
          BASE_URL="${R2_PUBLIC_URL}/releases/${VERSION}"
          if [ -n "$MANUAL_NOTES_INPUT" ] && [ "$MANUAL_NOTES_INPUT" != "Bug fixes and improvements." ]; then
            NOTES="$MANUAL_NOTES_INPUT"
          else
            NOTES="$CHANGELOG_FROM_JOB"
          fi

          LATEST_URL="${R2_PUBLIC_URL}/latest"

          jq -n \
            --arg ver "$VERSION_NUM" \
            --arg notes "$NOTES" \
            --arg da "${BASE_URL}/Yansu-darwin-arm64.app.tar.gz" \
            --arg di "${BASE_URL}/Yansu-darwin-amd64.app.tar.gz" \
            --arg la "${BASE_URL}/Yansu-linux-amd64.gz" \
            --arg wa "${BASE_URL}/Yansu-windows-amd64.gz" \
            --arg dld_mac_arm64 "${LATEST_URL}/Yansu-darwin-arm64.dmg" \
            --arg dld_mac_amd64 "${LATEST_URL}/Yansu-darwin-amd64.dmg" \
            --arg dld_linux "${LATEST_URL}/Yansu-linux-amd64.tar.gz" \
            --arg dld_windows "${LATEST_URL}/Yansu-windows-amd64.zip" \
            '{
              version: $ver,
              release_notes: $notes,
              assets: {
                "darwin-arm64": $da,
                "darwin-amd64": $di,
                "linux-amd64": $la,
                "windows-amd64": $wa
              },
              downloads: {
                "darwin-arm64": $dld_mac_arm64,
                "darwin-amd64": $dld_mac_amd64,
                "linux-amd64": $dld_linux,
                "windows-amd64": $dld_windows
              }
            }' > r2-upload/version.json

          echo "=== Generated version.json ==="
          cat r2-upload/version.json

      - name: Upload versioned release to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"

          aws s3 cp r2-upload/ "s3://${R2_BUCKET}/releases/${VERSION}/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --exclude "version.json"

          echo "Uploaded release ${VERSION} to R2"

      - name: Upload latest files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp r2-upload/ "s3://${R2_BUCKET}/latest/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --exclude "version.json"

          echo "Updated latest/ with latest release files"

      - name: Update latest version.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp r2-upload/version.json "s3://${R2_BUCKET}/version.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --content-type "application/json"

          echo "Updated version.json"
