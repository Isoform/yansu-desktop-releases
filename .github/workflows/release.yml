name: Release Yansu Desktop

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.1). Leave empty to auto-increment.'
        required: false
        default: ''
      bump_type:
        description: 'Version bump type (used when version is empty)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      release_notes:
        description: 'Release notes (markdown supported)'
        required: false
        default: 'Bug fixes and improvements.'

env:
  APP_NAME: Yansu
  SOURCE_REPO: Isoform/something
  SOURCE_PATH: wails-gui
  SOURCE_REF: main

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.VERSION }}
      version_num: ${{ steps.resolve.outputs.VERSION_NUM }}
      environment: ${{ steps.resolve.outputs.ENVIRONMENT }}
      is_staging: ${{ steps.resolve.outputs.IS_STAGING }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ENVIRONMENT="${{ inputs.environment || github.event.client_payload.environment || 'production' }}"
          echo "ENVIRONMENT=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          if [ "$ENVIRONMENT" = "staging" ]; then
            echo "IS_STAGING=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_STAGING=false" >> "$GITHUB_OUTPUT"
          fi

          # Helper: find latest production (non-prerelease) tag via semver sort.
          find_latest_prod() {
            gh release list --repo "${{ github.repository }}" --limit 100 --exclude-drafts \
              --json tagName,isPrerelease -q '.[] | select(.isPrerelease == false) | .tagName' 2>/dev/null \
              | sort -V | tail -1
          }

          # Helper: bump a semver tag. Usage: bump_version v0.1.59 patch → v0.1.60
          bump_version() {
            local SEMVER="${1#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
            MAJOR="${MAJOR:-0}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"
            local BUMP="${2:-patch}"
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch|*) PATCH=$((PATCH + 1)) ;;
            esac
            echo "v${MAJOR}.${MINOR}.${PATCH}"
          }

          # Use explicitly provided version if available
          EXPLICIT="${{ github.event.client_payload.version || inputs.version }}"
          if [ -n "$EXPLICIT" ]; then
            if [ "$ENVIRONMENT" = "staging" ]; then
              # Ensure staging versions always carry a -beta suffix.
              # If the user supplied a plain version like v0.1.60, append -beta.1.
              case "$EXPLICIT" in
                *-beta*) ;; # already has suffix
                *) EXPLICIT="${EXPLICIT}-beta.1" ;;
              esac
            else
              # Production must never use a pre-release tag
              case "$EXPLICIT" in
                *-beta*)
                  echo "::error::Cannot use a beta version tag for a production release: $EXPLICIT"
                  exit 1
                  ;;
              esac
            fi
            echo "Using explicit version: $EXPLICIT"
            echo "VERSION=${EXPLICIT}" >> "$GITHUB_OUTPUT"
            CLEAN="${EXPLICIT#v}"
            CLEAN="${CLEAN%%-beta.*}"
            echo "VERSION_NUM=${CLEAN}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find latest production release (always needed as baseline)
          PROD_LATEST=$(find_latest_prod)
          PROD_LATEST="${PROD_LATEST:-v0.0.0}"
          echo "Latest production release: $PROD_LATEST"

          if [ "$ENVIRONMENT" = "staging" ]; then
            # Staging: next prod version + beta sequence.
            # e.g. prod=v0.1.59 → staging=v0.1.60-beta.1, v0.1.60-beta.2, ...
            NEXT_BASE=$(bump_version "$PROD_LATEST" "${{ inputs.bump_type || 'patch' }}")

            # Find latest beta for this base version
            LATEST_BETA=$(gh release list --repo "${{ github.repository }}" --limit 100 --exclude-drafts \
              --json tagName -q '.[].tagName' 2>/dev/null \
              | grep "^${NEXT_BASE}-beta\." | sort -V | tail -1)

            if [ -z "$LATEST_BETA" ]; then
              VERSION="${NEXT_BASE}-beta.1"
            else
              SEQ="${LATEST_BETA##*-beta.}"
              VERSION="${NEXT_BASE}-beta.$((SEQ + 1))"
            fi

            echo "Auto-incremented staging version: $VERSION (based on prod $PROD_LATEST)"
            echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
            CLEAN="${VERSION#v}"
            CLEAN="${CLEAN%%-beta.*}"
            echo "VERSION_NUM=${CLEAN}" >> "$GITHUB_OUTPUT"
          else
            # Production: bump from latest prod release
            VERSION=$(bump_version "$PROD_LATEST" "${{ inputs.bump_type || 'patch' }}")
            echo "Auto-incremented production version: $VERSION"
            echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "VERSION_NUM=${VERSION#v}" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: [resolve-version]
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: source/${{ env.SOURCE_PATH }}/go.sum

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          brew install create-dmg

      - name: Import macOS certificates
        env:
          CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Install frontend deps
        working-directory: source/${{ env.SOURCE_PATH }}/frontend
        run: pnpm install

      - name: Compute environment ldflags
        id: env-ldflags
        run: |
          if [ "${{ needs.resolve-version.outputs.is_staging }}" = "true" ]; then
            echo "LDFLAGS=-X main.DefaultWebBaseURL=https://staging-dashboard.yansu.ai -X main.R2ManifestURL=${{ secrets.R2_PUBLIC_URL }}/staging/version.json" >> "$GITHUB_OUTPUT"
          else
            echo "LDFLAGS=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, embed & package
        working-directory: source/${{ env.SOURCE_PATH }}
        env:
          ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CODEX_ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUILD_ARGS=(
            --platform darwin/${{ matrix.arch }}
            --version ${{ needs.resolve-version.outputs.version_num }}
            --dmg
          )
          if [ -n "${{ steps.env-ldflags.outputs.LDFLAGS }}" ]; then
            BUILD_ARGS+=(--ldflags "${{ steps.env-ldflags.outputs.LDFLAGS }}")
          fi
          bash scripts/build-wails.sh "${BUILD_ARGS[@]}"

      - name: Rename DMG with arch suffix
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        run: |
          mv "${{ env.APP_NAME }}.dmg" "${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.dmg"
          echo "DMG: $(du -sh ${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.dmg | cut -f1)"

      - name: Package — .app.tar.gz (auto-update) + .gz (legacy)
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        run: |
          # .app.tar.gz: full signed+notarized bundle for self-update (preserves codesign)
          APP_TAR="${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.app.tar.gz"
          tar -czf "$APP_TAR" "${{ env.APP_NAME }}.app"
          echo "APP_TAR: $(du -sh $APP_TAR | cut -f1)"

          # .gz: bare binary (legacy, kept for older clients)
          BINARY="${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}"
          GZ="${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.gz"
          gzip -c "$BINARY" > "$GZ"
          echo "GZ: $(du -sh $GZ | cut -f1)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-darwin-${{ matrix.arch }}
          path: |
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.dmg
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.app.tar.gz
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-darwin-${{ matrix.arch }}.gz

  build-linux:
    name: Build Linux (amd64)
    needs: [resolve-version]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gcc \
            pkg-config \
            imagemagick \
            libcap-dev \
            libseccomp-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: source/${{ env.SOURCE_PATH }}/go.sum

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: source/${{ env.SOURCE_PATH }}/frontend
        run: pnpm install

      - name: Compute environment ldflags
        id: env-ldflags
        run: |
          if [ "${{ needs.resolve-version.outputs.is_staging }}" = "true" ]; then
            echo "LDFLAGS=-X main.DefaultWebBaseURL=https://staging-dashboard.yansu.ai -X main.R2ManifestURL=${{ secrets.R2_PUBLIC_URL }}/staging/version.json" >> "$GITHUB_OUTPUT"
          else
            echo "LDFLAGS=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, embed & package
        working-directory: source/${{ env.SOURCE_PATH }}
        env:
          ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CODEX_ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          BUILD_ARGS=(
            --platform linux/amd64
            --version ${{ needs.resolve-version.outputs.version_num }}
          )
          if [ -n "${{ steps.env-ldflags.outputs.LDFLAGS }}" ]; then
            BUILD_ARGS+=(--ldflags "${{ steps.env-ldflags.outputs.LDFLAGS }}")
          fi
          bash scripts/build-wails.sh "${BUILD_ARGS[@]}"

      - name: Package — .tar.gz (full install) + .gz (auto-update)
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        run: |
          TAR="${{ env.APP_NAME }}-linux-amd64.tar.gz"
          GZ="${{ env.APP_NAME }}-linux-amd64.gz"
          # .tar.gz contains binary + all bundled dependencies (preserves Unix permissions)
          tar czf "$TAR" "${{ env.APP_NAME }}" acp-bundle bun-bundle codex-acp-bundle yansu-cli-bundle
          # .gz is the bare binary for auto-update
          gzip -c "${{ env.APP_NAME }}" > "$GZ"
          echo "TAR: $(du -sh $TAR | cut -f1) | GZ: $(du -sh $GZ | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-amd64
          path: |
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-linux-amd64.tar.gz
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-linux-amd64.gz

  build-windows:
    name: Build Windows (amd64)
    needs: [resolve-version]
    runs-on: windows-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: source/${{ env.SOURCE_PATH }}/go.sum

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: source/${{ env.SOURCE_PATH }}/frontend
        run: pnpm install

      - name: Compute environment ldflags
        id: env-ldflags
        shell: bash
        run: |
          if [ "${{ needs.resolve-version.outputs.is_staging }}" = "true" ]; then
            echo "LDFLAGS=-X main.DefaultWebBaseURL=https://staging-dashboard.yansu.ai -X main.R2ManifestURL=${{ secrets.R2_PUBLIC_URL }}/staging/version.json" >> "$GITHUB_OUTPUT"
          else
            echo "LDFLAGS=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, embed & package
        working-directory: source/${{ env.SOURCE_PATH }}
        env:
          ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          CODEX_ACP_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        shell: bash
        run: |
          BUILD_ARGS=(
            --platform windows/amd64
            --version ${{ needs.resolve-version.outputs.version_num }}
          )
          if [ -n "${{ steps.env-ldflags.outputs.LDFLAGS }}" ]; then
            BUILD_ARGS+=(--ldflags "${{ steps.env-ldflags.outputs.LDFLAGS }}")
          fi
          bash scripts/build-wails.sh "${BUILD_ARGS[@]}"

      - name: Package — .zip (full install) + .gz (auto-update)
        working-directory: source/${{ env.SOURCE_PATH }}/build/bin
        shell: bash
        run: |
          ZIP="${{ env.APP_NAME }}-windows-amd64.zip"
          GZ="${{ env.APP_NAME }}-windows-amd64.gz"
          # .zip contains exe + all bundled dependencies (acp, bun, codex-acp, yansu-cli)
          7z a -mx9 "$ZIP" "${{ env.APP_NAME }}.exe" acp-bundle bun-bundle codex-acp-bundle yansu-cli-bundle
          # .gz is the bare binary for auto-update
          gzip -c "${{ env.APP_NAME }}.exe" > "$GZ"
          echo "ZIP: $(du -sh $ZIP | cut -f1) | GZ: $(du -sh $GZ | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-amd64
          path: |
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-windows-amd64.zip
            source/${{ env.SOURCE_PATH }}/build/bin/${{ env.APP_NAME }}-windows-amd64.gz

  release:
    name: Create Release
    needs: [resolve-version, build-macos, build-linux, build-windows]
    if: ${{ !cancelled() && needs.build-macos.result == 'success' && needs.build-linux.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.gz" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt
          echo "=== Release assets ===" && ls -lh

      - name: Clean up stale draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          REPO="${{ github.repository }}"
          if gh release view "$VERSION" --repo "$REPO" &>/dev/null; then
            echo "Deleting existing release $VERSION..."
            gh release delete "$VERSION" --repo "$REPO" --yes --cleanup-tag
          fi

      - name: Set release notes
        id: notes
        run: |
          NOTES="${{ github.event.client_payload.release_notes || inputs.release_notes || 'Bug fixes and improvements.' }}"
          ENV_LABEL=""
          if [ "${{ needs.resolve-version.outputs.is_staging }}" = "true" ]; then
            ENV_LABEL=" (Staging)"
          fi
          {
            echo "BODY<<EOF"
            echo "Yansu Desktop ${{ needs.resolve-version.outputs.version }}${ENV_LABEL}"
            echo ""
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          REPO="${{ github.repository }}"
          PRERELEASE_FLAG=""
          if [ "${{ needs.resolve-version.outputs.is_staging }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "Yansu Desktop $VERSION" \
            --notes "${{ steps.notes.outputs.BODY }}" \
            $PRERELEASE_FLAG \
            release/*

  upload-to-r2:
    name: Upload to R2
    needs: [resolve-version, release]
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare files for R2
        run: |
          mkdir -p r2-upload
          find artifacts -type f \( -name "*.gz" -o -name "*.app.tar.gz" \) -exec cp {} r2-upload/ \;
          echo "=== Files prepared for R2 ===" && ls -lh r2-upload/

      - name: Generate version.json manifest
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          VERSION_NUM="${{ needs.resolve-version.outputs.version_num }}"
          BASE_URL="${R2_PUBLIC_URL}/releases/${VERSION}"
          NOTES="${{ github.event.client_payload.release_notes || inputs.release_notes || 'Bug fixes and improvements.' }}"

          jq -n \
            --arg ver "$VERSION_NUM" \
            --arg notes "$NOTES" \
            --arg da "${BASE_URL}/Yansu-darwin-arm64.app.tar.gz" \
            --arg di "${BASE_URL}/Yansu-darwin-amd64.app.tar.gz" \
            --arg la "${BASE_URL}/Yansu-linux-amd64.gz" \
            --arg wa "${BASE_URL}/Yansu-windows-amd64.gz" \
            '{
              version: $ver,
              release_notes: $notes,
              assets: {
                "darwin-arm64": $da,
                "darwin-amd64": $di,
                "linux-amd64": $la,
                "windows-amd64": $wa
              }
            }' > r2-upload/version.json

          echo "=== Generated version.json ==="
          cat r2-upload/version.json

      - name: Upload versioned release to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"

          aws s3 cp r2-upload/ "s3://${R2_BUCKET}/releases/${VERSION}/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --exclude "version.json"

          echo "Uploaded release ${VERSION} to R2"

      - name: Update latest version.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # Staging uploads to /staging/version.json; production uploads to /version.json
          if [ "${{ needs.resolve-version.outputs.is_staging }}" = "true" ]; then
            R2_MANIFEST_PATH="staging/version.json"
          else
            R2_MANIFEST_PATH="version.json"
          fi

          aws s3 cp r2-upload/version.json "s3://${R2_BUCKET}/${R2_MANIFEST_PATH}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto \
            --content-type "application/json"

          echo "Updated ${R2_MANIFEST_PATH}"
